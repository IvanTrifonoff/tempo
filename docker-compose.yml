version: '3.8'

services:
  app:
    image: ghcr.io/ivantrifonoff/tempo.trfnv.ru:latest
    container_name: ${CONTAINER_NAME:-tempo-app}
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      - NODE_ENV=production
    volumes:
      - tempo-uploads:/app/server/uploads
    networks:
      - default
      - db_net

volumes:
  tempo-uploads:
    external: true

networks:
  db_net:
    external: true
    name: mautrix-telegram_default
