# === Scanner/Бот path blocking — вставить в location / перед proxy_pass ===

# .env/.git/.svn file access
location ~* \.(env|git|svn|hg)$ {
    deny all;
    return 403;
}

# .git/config .git/HEAD and similar directory access
location ~* /\.(git|svn|hg|env)(/|$) {
    deny all;
    return 403;
}

# Common scanner files
location ~* (sendgrid\.env|\.env\.|\.env\.prod|\.env\.bak|\.env\.local|\.env\.dev|composer\.json|package\.json\.bak) {
    deny all;
    return 403;
}

# CMS scanners (WordPress, Joomla, Drupal, etc.)
location ~* /(wp-admin|wp-content|wp-includes|wp-login|xmlrpc|administrator|components|modules|plugins|themes) {
    deny all;
    return 403;
}

# Admin panels scanners
location ~* /(adminer|phpmyadmin|pma|mysqladmin|cgi-bin|myadmin) {
    deny all;
    return 403;
}
