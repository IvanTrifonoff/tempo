# Fail2Ban filter for malicious scanners hitting sensitive paths
# Matches requests to .env, .git, .svn, CMS admin paths, etc.
#
[Definition]

failregex = ^<HOST> .* "(GET|POST|HEAD) .*\.(env|git|svn|hg)(\?| |\/|")[^"]*" (200|403|404|301) .*$
            ^<HOST> .* "(GET|POST|HEAD) .*/\.(git|svn|hg|env)(/.*|\?) [^"]*" (200|403|404|301) .*$
            ^<HOST> .* "(GET|POST|HEAD) .*sendgrid\.env[^"]*" (200|403|404|301) .*$
            ^<HOST> .* "(GET|POST|HEAD) .*\.env\.(prod|bak|local|dev|old)[^"]*" (200|403|404|301) .*$
            ^<HOST> .* "(GET|POST|HEAD) .*/(wp-admin|wp-content|wp-includes|wp-login\.php|xmlrpc\.php|administrator|adminer|phpmyadmin|pma|mysqladmin|cgi-bin|myadmin)[^"]*" (200|403|404|301) .*$

ignoreregex =
