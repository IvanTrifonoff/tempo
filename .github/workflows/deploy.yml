name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ivantrifonoff/tempo.trfnv.ru

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Check Version Consistency (Mandatory Changelog)
        run: node scripts/check-version.js

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: tempo
          POSTGRES_PASSWORD: tempo_password
          POSTGRES_DB: tempo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          cd server && npm install

      - name: Run Schema
        run: |
          # Применяем схему БД для тестов
          PGPASSWORD=tempo_password psql -h localhost -U tempo -d tempo_test -f server/schema.sql

      - name: Run Tests
        env:
          DATABASE_URL: postgres://tempo:tempo_password@localhost:5432/tempo_test
          JWT_SECRET: test-secret
        run: |
          cd server && npm test

      - name: Build Frontend
        run: |
          npm run build

  build-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=test,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_DIR=tempo-pg-prod" >> $GITHUB_ENV
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          else
            echo "TARGET_DIR=tempo-pg-test" >> $GITHUB_ENV
            echo "DOCKER_TAG=test" >> $GITHUB_ENV
          fi

      - name: Copy Config Files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,constants.tsx,CHANGELOG.md"
          target: "${{ env.TARGET_DIR }}/"

      - name: Deploy & Sync Changelog
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Login & Pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
            
            # 2. Update Environment
            cd ${{ env.TARGET_DIR }}
            
            # Обновляем тег в docker-compose.yml если он там захардкожен
            sed -i "s|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}|g" docker-compose.yml || true
            
                        docker compose down
            
                        docker compose up -d
            
                        
            
                        docker image prune -f
            
            
